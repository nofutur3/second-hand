name: CI/CD

on:
  push:
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./src/...

      - name: Test
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./src/...

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.nofutur3.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            registry.nofutur3.com/secondhand-api:latest
            registry.nofutur3.com/secondhand-api:sha-${{ github.sha }}
          cache-from: type=registry,ref=registry.nofutur3.com/secondhand-api:buildcache
          cache-to: type=registry,ref=registry.nofutur3.com/secondhand-api:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            registry.nofutur3.com/secondhand-frontend:latest
            registry.nofutur3.com/secondhand-frontend:sha-${{ github.sha }}
          cache-from: type=registry,ref=registry.nofutur3.com/secondhand-frontend:buildcache
          cache-to: type=registry,ref=registry.nofutur3.com/secondhand-frontend:buildcache,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::error::KUBECONFIG secret is not set. Run: base64 -w0 ~/.kube/config and add the output as the KUBECONFIG secret."
            exit 1
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config set-cluster \
            "$(kubectl config view -o jsonpath='{.clusters[0].name}')" \
            --insecure-skip-tls-verify=true

      - name: Apply namespace
        run: kubectl apply --validate=false -f k8s/namespace.yaml

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry registry-nofutur3 \
            --namespace=secondhand \
            --docker-server=registry.nofutur3.com \
            --docker-username=${{ secrets.REGISTRY_USERNAME }} \
            --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Apply manifests
        run: |
          kubectl apply --validate=false \
            -f k8s/postgres-storage.yaml \
            -f k8s/postgres-deployment.yaml \
            -f k8s/api-deployment.yaml \
            -f k8s/frontend-deployment.yaml \
            -f k8s/ingress.yaml

      - name: Update images
        run: |
          kubectl set image deployment/secondhand-api \
            api=registry.nofutur3.com/secondhand-api:sha-${{ github.sha }} \
            --namespace=secondhand
          kubectl set image deployment/secondhand-frontend \
            frontend=registry.nofutur3.com/secondhand-frontend:sha-${{ github.sha }} \
            --namespace=secondhand

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/secondhand-api --namespace=secondhand --timeout=120s
          kubectl rollout status deployment/secondhand-frontend --namespace=secondhand --timeout=120s
