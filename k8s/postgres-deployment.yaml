apiVersion: apps/v1
kind: Deployment
metadata:
  name: secondhand-postgres
  namespace: secondhand
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: secondhand-postgres
  template:
    metadata:
      labels:
        app: secondhand-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: secondhand
            - name: POSTGRES_USER
              value: secondhand
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secondhand-postgres
                  key: password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "secondhand"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: secondhand-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: secondhand-postgres
  namespace: secondhand
spec:
  selector:
    app: secondhand-postgres
  ports:
    - port: 5432
      targetPort: 5432
