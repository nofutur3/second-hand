apiVersion: batch/v1
kind: CronJob
metadata:
  name: ebay-watcher
  namespace: secondhand
  labels:
    app: ebay-watcher
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ebay-watcher
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: registry-nofutur3
          containers:
            - name: cron
              image: registry.nofutur3.com/secondhand-cron:latest
              env:
                - name: DB_HOST
                  value: secondhand-postgres
                - name: DB_PORT
                  value: "5432"
                - name: DB_USER
                  value: secondhand
                - name: DB_NAME
                  value: secondhand
                - name: DB_SSLMODE
                  value: disable
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: secondhand-postgres
                      key: password
                - name: EBAY_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: secondhand-ebay
                      key: EBAY_CLIENT_ID
                - name: EBAY_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: secondhand-ebay
                      key: EBAY_CLIENT_SECRET
                - name: TELEGRAM_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: secondhand-ebay
                      key: TELEGRAM_BOT_TOKEN
                - name: TELEGRAM_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: secondhand-ebay
                      key: TELEGRAM_CHAT_ID
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "1000m"
